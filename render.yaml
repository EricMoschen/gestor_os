services:
  - type: web
    name: gestor-os
    env: python
    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      python manage.py shell -c "import os; from django.contrib.auth import get_user_model; User = get_user_model(); username = os.getenv('DJANGO_SUPERUSER_USERNAME'); password = os.getenv('DJANGO_SUPERUSER_PASSWORD'); email = os.getenv('DJANGO_SUPERUSER_EMAIL', 'admin@example.com'); username and password and (User.objects.filter(username=username).exists() or User.objects.create_superuser(username, email, password))"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DJANGO_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false

